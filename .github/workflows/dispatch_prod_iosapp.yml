name: Prod iOS Dispatch
on:
  push:
    branches:
      - 'release-ios'

jobs:
  deploy_iosapp:
    name: Deploy iOS App
    uses: ./.github/workflows/job_deploy_iosapp.yml
    secrets: inherit

  create_release_tag:
    name: Upsert Release Tag
    needs: deploy_iosapp
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve iOS version tag
        id: version
        run: |
          VERSION=$(sed -n 's/.*MARKETING_VERSION = \([0-9][0-9.]*\);/\1/p' iOSApp/MaTool.xcodeproj/project.pbxproj | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "MARKETING_VERSION could not be resolved."
            exit 1
          fi
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Recreate tag (delete if exists)
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        with:
          script: |
            const tag = process.env.TAG;
            const sha = process.env.TARGET_SHA;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`Existing tag found: ${tag}. Deleting before recreation.`);
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing tag found: ${tag}.`);
              } else {
                throw error;
              }
            }

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha,
              });
            } catch (error) {
              if (error.status === 422) {
                core.info(`Tag ${tag} was created concurrently. Recreating tag.`);
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${tag}`,
                });
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/tags/${tag}`,
                  sha,
                });
              } else {
                throw error;
              }
            }
            core.info(`Tag ${tag} now points to ${sha}`);
