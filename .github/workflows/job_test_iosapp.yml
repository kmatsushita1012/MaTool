name: Test iOS App

on:
  workflow_call:

jobs:
  test-iosapp-library:
    name: Run iOS App Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Ensure SPM Cache Dir Exists
        run: mkdir -p iOSApp/Caches/org.swift.swiftpm
      
      - name: Cache SPM
        uses: actions/cache@v3
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm/
          key: ${{ runner.os }}-spm-iOSApp-26.3
          restore-keys: |
            ${{ runner.os }}-spm-iOSApp-

      - name: Cache DerivedData
        uses: actions/cache@v3
        with:
          path: iOSApp/.derivedData
          key: ${{ runner.os }}-derived-26.3
          restore-keys: |
            ${{ runner.os }}-derived-

      - name: Select latest iPhone simulator
        id: sim
        shell: bash
        run: |
          set -euxo pipefail

          DEST_LINE="$(
            xcodebuild \
              -project iOSApp/MaTool.xcodeproj \
              -scheme iOSApp \
              -showdestinations 2>/dev/null \
            | grep 'platform:iOS Simulator' \
            | grep -E 'iPhone [0-9]+,' \
            | sed -E 's/.*OS:([0-9.]+).*/\1 &/' \
            | sort -t' ' -k1,1V \
            | tail -1
          )"

          if [ -z "${DEST_LINE:-}" ]; then
            echo "No suitable iPhone simulator found"
            xcodebuild \
              -project iOSApp/MaTool.xcodeproj \
              -scheme iOSApp \
              -showdestinations
            exit 1
          fi

          DESTINATION_ID="$(echo "$DEST_LINE" | sed -E 's/.*id:([^,}]*).*/\1/')"
          DEVICE_NAME="$(echo "$DEST_LINE" | sed -E 's/.*name:([^,]+).*/\1/')"
          OS_VERSION="$(echo "$DEST_LINE" | sed -E 's/.*OS:([^,}]+).*/\1/')"

          echo "Selected simulator:"
          echo "  Device: $DEVICE_NAME"
          echo "  OS:     iOS $OS_VERSION"
          echo "  UDID:   $DESTINATION_ID"

          echo "DESTINATION_ID=$DESTINATION_ID" >> $GITHUB_OUTPUT

      - name: Build&Test
        run: |
          set -o pipefail
          mkdir -p build/reports
          xcodebuild \
            -project iOSApp/MaTool.xcodeproj \
            -scheme iOSApp \
            -destination "id=${{ steps.sim.outputs.DESTINATION_ID }}" \
            -configuration Debug \
            -derivedDataPath iOSApp/.derivedData \
            -enableCodeCoverage YES \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_SWIFT_MACROS=YES \
            test \
            | tee build/reports/test.log | xcpretty

      - name: Upload Test Results
        id: upload-tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: iOSApp/.derivedData/Logs/Test/*.xcresult

      - name: Print Test Summary
        if: always()
        run: |
          set -e
          echo "===== Test Results Summary ====="

          xcresult_path=$(find iOSApp/.derivedData/Logs/Test -type d -name "*.xcresult" | sort | tail -n 1)
          echo "Using result: $xcresult_path"

          # JSONを取得
          xcrun xcresulttool get test-results summary --path "$xcresult_path" --format json > build/reports/test_summary.json

          # 失敗したテストを整形表示
          echo "----- Failed Tests -----"
          jq -r '
            .testFailures[]? |
            "✘ \(.testIdentifierString)\t\"\(.failureText)\""
          ' build/reports/test_summary.json || echo "✅ No failed tests"

          echo ""
          echo "───────────────💻 Environment ───────────────"

          title=$(jq -r '.title' build/reports/test_summary.json)
          platform=$(jq -r '.devicesAndConfigurations[0].device.platform' build/reports/test_summary.json)
          device=$(jq -r '.devicesAndConfigurations[0].device.deviceName' build/reports/test_summary.json)
          osver=$(jq -r '.devicesAndConfigurations[0].device.osVersion' build/reports/test_summary.json)

          # 右側のカラム幅を固定（例：30文字）
          pad() {
            printf "%-30s" "$1"
          }

          echo "┌──────────────────────┬────────────────────────────────┐"
          printf "│ %-20s │ %s │\n" "Title"     "$(pad "$title")"
          printf "│ %-20s │ %s │\n" "Platform"  "$(pad "$platform")"
          printf "│ %-20s │ %s │\n" "Device"    "$(pad "$device")"
          printf "│ %-20s │ %s │\n" "OS Version" "$(pad "$osver")"
          echo "└──────────────────────┴────────────────────────────────┘"


          echo ""
          echo "───────────────📊 Test Counts ───────────────"
          passed=$(jq '.devicesAndConfigurations[0].passedTests' build/reports/test_summary.json)
          skipped=$(jq '.devicesAndConfigurations[0].skippedTests' build/reports/test_summary.json)
          failed=$(jq '.devicesAndConfigurations[0].failedTests' build/reports/test_summary.json)

          passed=$((passed + 0))
          skipped=$((skipped + 0))
          failed=$((failed + 0))

          total=$((passed + skipped + failed))

          echo "┌─────────────┬──────────┐"
          printf "│ %-11s │ %8s │\n" "Passed" "$passed"
          printf "│ %-11s │ %8s │\n" "Skipped" "$skipped"
          printf "│ %-11s │ %8s │\n" "Failed" "$failed"
          printf "│ %-11s │ %8s │\n" "Total" "$total"
          echo "└─────────────┴──────────┘"

          echo ""
          if [ "$failed" -gt 0 ]; then
            echo "❌ Some tests failed ($failed)"
            exit 1
          else
            echo "✅ All tests passed"
          fi
