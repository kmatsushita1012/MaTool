name: Deploy iOS App

on:
  workflow_call:

jobs:
  release-archive:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Create amplifyconfiguration.json
        env:
          AMPLIFYCONFIGURATION_JSON_B64: ${{ secrets.AMPLIFYCONFIGURATION_JSON_B64 }}
        run: |
          echo "$AMPLIFYCONFIGURATION_JSON_B64" | base64 --decode > iOSApp/amplifyconfiguration.json

      - name: Ensure SPM Cache Dir Exists
        run: mkdir -p iOSApp/Caches/org.swift.swiftpm

      - name: Cache SPM
        uses: actions/cache@v3
        with:
          path: iOSApp/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-iOSApp-${{ hashFiles('iOSApp/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-iOSApp-

      - name: Cache DerivedData
        uses: actions/cache@v3
        with:
          path: iOSApp/.derivedData
          key: ${{ runner.os }}-derived-${{ hashFiles('iOSApp/MaTool.xcodeproj/project.pbxproj', '**/*.swift', '**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-derived-

      - name: Create iOS config files
        env:
          MATOOL_API_BASE_URL: ${{ secrets.MATOOL_API_BASE_URL }}
          MATOOL_USER_GUIDE_URL: ${{ secrets.MATOOL_USER_GUIDE_URL }}
          MATOOL_CONTACT_URL: ${{ secrets.MATOOL_CONTACT_URL }}
          MATOOL_ADMOB_APP_ID: ${{ secrets.MATOOL_ADMOB_APP_ID }}
          MATOOL_PUBLIC_MAP_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.MATOOL_PUBLIC_MAP_INTERSTITIAL_AD_UNIT_ID }}
          MATOOL_PUBLIC_MAP_BANNER_AD_UNIT_ID: ${{ secrets.MATOOL_PUBLIC_MAP_BANNER_AD_UNIT_ID }}
        run: |
          chmod +x .github/scripts/generate_ios_xcconfig.sh
          ./.github/scripts/generate_ios_xcconfig.sh

      - name: Build
        run: |
          xcodebuild archive \
            -project iOSApp/MaTool.xcodeproj \
            -scheme iOSApp \
            -archivePath iOSApp/MaTool.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath iOSApp/.derivedData \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_SWIFT_MACROS=YES

      - name: Create ExportOptions.plist
        run: |
          echo '${{ secrets.EXPORT_OPTIONS }}' > ExportOptions.plist
          cat ExportOptions.plist

      - name: Create Private Key
        run: |
          mkdir private_keys
          echo -n '${{ secrets.APPLE_API_KEY_BASE64 }}' | base64 --decode > ./private_keys/AuthKey_${{ secrets.APPLE_API_ISSUE_ID }}.p8

      - name: Export IPA
        run: |
          xcodebuild -exportArchive -archivePath iOSApp/MaTool.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath build/export -allowProvisioningUpdates -authenticationKeyPath `pwd`/private_keys/AuthKey_${{ secrets.APPLE_API_ISSUE_ID }}.p8 -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} -authenticationKeyIssuerID ${{ secrets.APPLE_API_ISSUE_ID }}

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app -f build/export/MaTool.ipa -t ios -u ${{ secrets.APPLE_ID }} -p ${{ secrets.APP_SPECIFIC_PASSWORD }} --type ios
