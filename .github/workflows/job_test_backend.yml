name: Test Backend

on:
  workflow_call:

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: macos-26

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode 26.3
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26.3"

    - name: Ensure SPM Cache Dir Exists
      run: mkdir -p Backend/Caches/org.swift.swiftpm

    - name: Create empty .env
      run: |
        mkdir -p Backend
        touch Backend/.env

    # --- SPM キャッシュ ---
    - name: Cache SPM
      uses: actions/cache@v3
      with:
        path: |
          ~/Library/Caches/org.swift.swiftpm/
        key: ${{ runner.os }}-spm-Backend-26.3
        restore-keys: |
          ${{ runner.os }}-spm-Backend-

    # --- DerivedData キャッシュ ---
    - name: Cache DerivedData
      uses: actions/cache@v3
      with:
        path: Backend/.derivedData
        key: ${{ runner.os }}-derived-26.3
        restore-keys: |
          ${{ runner.os }}-derived-

    - name: Build & Test
      run: |
        set -o pipefail
        mkdir -p build/reports
        xcodebuild \
          -workspace MaTool.xcworkspace \
          -scheme BackendTests \
          -testPlan BackendTests \
          -destination 'platform=macOS' \
          -configuration Debug \
          -derivedDataPath Backend/.derivedData \
          -enableCodeCoverage YES \
          -skipMacroValidation \
          CODE_SIGNING_ALLOWED=NO \
          ENABLE_SWIFT_MACROS=YES \
          test \
          | tee build/reports/backend-test.log

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: Backend/.build/debug/codecov/

    - name: Print Test Summary
      if: always()
      run: |
        set -e
        echo "===== Test Results Summary ====="

        xcresult_path=$(find Backend/.derivedData/Logs/Test -type d -name "*.xcresult" | sort | tail -n 1)
        echo "Using result: $xcresult_path"

        # JSONを取得
        xcrun xcresulttool get test-results summary --path "$xcresult_path" --format json > build/reports/test_summary.json

        # 失敗したテストを整形表示
        echo "----- Failed Tests -----"
        jq -r '
          .testFailures[]? |
          "✘ \(.testIdentifierString)\t\"\(.failureText)\""
        ' build/reports/test_summary.json || echo "✅ No failed tests"

        echo ""
        echo "───────────────💻 Environment ───────────────"

        title=$(jq -r '.title' build/reports/test_summary.json)
        platform=$(jq -r '.devicesAndConfigurations[0].device.platform' build/reports/test_summary.json)
        device=$(jq -r '.devicesAndConfigurations[0].device.deviceName' build/reports/test_summary.json)
        osver=$(jq -r '.devicesAndConfigurations[0].device.osVersion' build/reports/test_summary.json)

        # 右側のカラム幅を固定（例：30文字）
        pad() {
          printf "%-30s" "$1"
        }

        echo "┌──────────────────────┬────────────────────────────────┐"
        printf "│ %-20s │ %s │\n" "Title"     "$(pad "$title")"
        printf "│ %-20s │ %s │\n" "Platform"  "$(pad "$platform")"
        printf "│ %-20s │ %s │\n" "Device"    "$(pad "$device")"
        printf "│ %-20s │ %s │\n" "OS Version" "$(pad "$osver")"
        echo "└──────────────────────┴────────────────────────────────┘"


        echo ""
        echo "───────────────📊 Test Counts ───────────────"
        passed=$(jq '.devicesAndConfigurations[0].passedTests' build/reports/test_summary.json)
        skipped=$(jq '.devicesAndConfigurations[0].skippedTests' build/reports/test_summary.json)
        failed=$(jq '.devicesAndConfigurations[0].failedTests' build/reports/test_summary.json)

        passed=$((passed + 0))
        skipped=$((skipped + 0))
        failed=$((failed + 0))

        total=$((passed + skipped + failed))

        echo "┌─────────────┬──────────┐"
        printf "│ %-11s │ %8s │\n" "Passed" "$passed"
        printf "│ %-11s │ %8s │\n" "Skipped" "$skipped"
        printf "│ %-11s │ %8s │\n" "Failed" "$failed"
        printf "│ %-11s │ %8s │\n" "Total" "$total"
        echo "└─────────────┴──────────┘"

        echo ""
        if [ "$failed" -gt 0 ]; then
          echo "❌ Some tests failed ($failed)"
          exit 1
        else
          echo "✅ All tests passed"
        fi
