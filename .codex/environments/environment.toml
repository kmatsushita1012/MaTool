version = 1
name = "MaTool"

[setup]
script = '''
#!/bin/sh
set -eu

: "${CODEX_SOURCE_TREE_PATH:?CODEX_SOURCE_TREE_PATH is required}"
: "${CODEX_WORKTREE_PATH:?CODEX_WORKTREE_PATH is required}"

copy_file() {
  src="$1"
  dst="$2"
  if [ -f "$src" ]; then
    mkdir -p "$(dirname "$dst")"
    cp -p "$src" "$dst"
  fi
}

copy_file "$CODEX_SOURCE_TREE_PATH/iOSApp/Config/Debug.xcconfig" \
          "$CODEX_WORKTREE_PATH/iOSApp/Config/Debug.xcconfig"

copy_file "$CODEX_SOURCE_TREE_PATH/iOSApp/Config/Release.xcconfig" \
          "$CODEX_WORKTREE_PATH/iOSApp/Config/Release.xcconfig"

copy_file "$CODEX_SOURCE_TREE_PATH/iOSApp/amplifyconfiguration.json" \
          "$CODEX_WORKTREE_PATH/iOSApp/amplifyconfiguration.json"
'''

